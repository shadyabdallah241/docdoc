name: docdoc
description: "Doctor appointment app"

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  flutter_bloc: ^9.1.1
  json_annotation: ^4.9.0
  freezed_annotation: ^3.1.0
  get_it: ^9.2.1
  retrofit: ^4.9.2
  logger: ^2.7.0
  dio: ^5.10.0
  flutter_svg: ^2.3.0
  flutter_screenutil_plus: ^1.5.0
  google_fonts: ^8.2.0
  pretty_dio_logger: ^1.4.0
  firebase_core: ^4.12.1
  firebase_auth: ^6.5.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.10.5 # 2.15.1 doesn't exist on pub.dev — latest stable is 2.10.5

  retrofit_generator: ^10.2.7
  json_serializable: ^6.14.0
  freezed: ^3.2.5
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true

  assets:
    - assets/images/
